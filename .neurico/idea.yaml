idea:
  title: Live Salmon Test for AI Scientists
  domain: artificial_intelligence
  hypothesis: 'Providing AI scientists with a known data generating process ("live"
    salmon) and asking them to analyze it will reveal the strengths and limitations
    of their methodologies, as evidenced by the collective insights in the papers
    they produce.

    '
  background:
    description: 'The famous dead salmon test asks neuroscientists to see what their
      methodology learns about a dead salmon. Now we have AI scientists, what if we
      give them a data generating process ("live" salmon) and see what they can find?

      In order to simulate the whole process, we can even get them to write papers
      and see if the papers collectively provide any insights.

      '
